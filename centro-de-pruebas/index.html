<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Productos</title>
    <link rel="stylesheet" href="prueba.css">
</head>
<body>
    <div class="container-table">
        <!-- Header -->
        <div class="header-card">
            <div class="header-content">
                <!-- Búsqueda -->
                <div class="search-section">
                    <div class="search-wrapper">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="Buscar producto o servicio"
                        />
                    </div>
                    <button class="btn-filter">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="4" x2="4" y1="21" y2="14"></line>
                            <line x1="4" x2="4" y1="10" y2="3"></line>
                            <line x1="12" x2="12" y1="21" y2="12"></line>
                            <line x1="12" x2="12" y1="8" y2="3"></line>
                            <line x1="20" x2="20" y1="21" y2="16"></line>
                            <line x1="20" x2="20" y1="12" y2="3"></line>
                            <line x1="2" x2="6" y1="14" y2="14"></line>
                            <line x1="10" x2="14" y1="8" y2="8"></line>
                            <line x1="18" x2="22" y1="16" y2="16"></line>
                        </svg>
                        Filtros
                    </button>
                </div>

                <!-- Acciones -->
                <div class="actions-section">
                    <button class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
                            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>
                        </svg>
                    </button>
                    <button class="btn-outline" id="addRowBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14"></path>
                            <path d="M12 5v14"></path>
                        </svg>
                        Añadir Fila
                    </button>
                    <button class="btn-outline" id="addColumnBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14"></path>
                            <path d="M12 5v14"></path>
                        </svg>
                        Añadir Columna
                    </button>
                    <button class="btn-primary">Crear / Importar</button>
                </div>
            </div>
        </div>

        <!-- Tabla -->
        <div class="table-card">
            <div class="table-wrapper">
                <table class="table" id="productTable">
                    <thead id="tableHead">
                        <!-- Se genera dinámicamente con JS -->
                    </thead>
                    <tbody id="tableBody">
                        <!-- Se genera dinámicamente con JS -->
                    </tbody>
                </table>
            </div>

            <!-- Paginación -->
            <div class="pagination">
                <div class="pagination-left">
                    <span>Filas por página:</span>
                    <select id="itemsPerPage" class="pagination-select">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                    </select>
                </div>

                <div class="pagination-right">
                    <span id="paginationInfo">1 a 10 de 10</span>
                    <div class="pagination-controls">
                        <button class="btn-nav" id="prevPage">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="m15 18-6-6 6-6"></path>
                            </svg>
                        </button>
                        <span id="pageInfo">Página 1 de 1</span>
                        <button class="btn-nav" id="nextPage">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="m9 18 6-6-6-6"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="prueba.js"></script>
</body>
</html>
